<!DOCTYPE html>
<html>
<head>
    <title>Mi Currículum - {{ user.username }}</title>
    <style>
        body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    /* Importante para que el efecto borroso funcione correctamente */
    position: relative; 
    overflow: hidden; /* Evita barras de desplazamiento extrañas */
}

/* Este es el pseudoelemento que crea el fondo borroso */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* AQUÍ PONES EL LINK DE LA IMAGEN (puedes usar el mismo del login) */
    background-image: url('https://wallpapers.com/images/hd/2560-x-1440-autumn-x8lgfwihigoxitvj.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    /* AQUÍ CONTROLAS EL NIVEL DE DESENFOQUE (BLUR) */
    filter: blur(8px); /* Prueba con 5px, 8px, 10px... */
    /* Un pequeño truco para oscurecer un poco el fondo si el texto no se lee bien */
    /* background-color: rgba(0,0,0,0.3); */
    /* background-blend-mode: darken; */
    z-index: -1; /* Asegura que el fondo esté DETRÁS de todo el contenido */
    transform: scale(1.1); /* Agranda un poquito el fondo para ocultar los bordes blancos del blur */
}

.cv-card {
    /* Mantenemos tu transparencia pero le subimos un poquito la opacidad (0.9) */
    background: rgba(247, 238, 221, 0.9); 
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* Sombra más fuerte y suave para efecto flotante */
    width: 80%;
    max-width: 600px;
    text-align: center;
    position: relative; /* Importante para que la sombra y el contenido resalten */
    z-index: 1; /* Asegura que la tarjeta esté DELANTE del fondo borroso */
}

/* --- El resto de tu código (.profile-img, h1, etc.) sigue igual --- */

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #49381e;
            margin-bottom: 20px;
        }

        h1 { color: #333; margin-bottom: 5px; }
        .subtitle { color: #181301; font-weight: bold; margin-bottom: 20px; }
        
        .info-section {
            text-align: left;
            margin-top: 30px;
            line-height: 1.6;
        }

        .logout-btn {
            background-color: #361607;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }

        .logout-btn:hover { background-color: #b8430d; }
        
        /* --- 1. Definir la animación base (Aparecer desde abajo) --- */
@keyframes entradaSuave {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.95); /* Empieza abajo y un poco más chica */
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1); /* Termina en su lugar y tamaño real */
    }
}

/* --- 2. Aplicar la animación a la tarjeta principal --- */
.cv-card {
    background: rgba(247, 238, 221, 0.9); 
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    width: 80%;
    max-width: 600px;
    text-align: center;
    position: relative;
    z-index: 1;
    /* --- AGREGAR ESTA LÍNEA --- */
    animation: entradaSuave 1s ease-out forwards; /* 1 segundo de duración */
}
    </style>
</head>
<body>

    <div class="cv-card">
        <img src="https://tse3.mm.bing.net/th/id/OIP.IUUNBtFTK0GsKnOEj5RAfwAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Foto de perfil" class="profile-img">
        
        <h1>Jeremias Ponce</h1>
        <p class="subtitle">Desarrollador Django</p>

        <div class="info-section">
            <h3>Sobre mí:</h3>
            <p>Estudiante de programación de software.</p>
            
            <h3>Habilidades</h3>
            <ul>
                <li>Python</li>
                <li>Django</li>
            </ul>
        </div>

        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Cerrar Sesión</button>
        </form>
    </div>

</body>
</html>
